<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 250" width="100%" height="100%">
  <!-- Styles and Animations -->
  <style>
    .bg { fill: #0d1117; }
    .grid-line { stroke: #1f2937; stroke-width: 1; opacity: 0.25; }
    
    /* Glowing effect for connections */
    .glow-line {
      stroke: url(#line-grad);
      stroke-width: 1.5;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: drawLine 8s linear infinite;
    }
    
    /* Pulsating nodes */
    .node {
      fill: #00f2fe;
      filter: url(#glow);
      animation: pulsate 3s ease-in-out infinite alternate;
    }
    .node-purple {
      fill: #9b51e0;
      filter: url(#glow-purple);
      animation: pulsate 4s ease-in-out infinite alternate;
    }
    .node-green {
      fill: #39ff14;
      filter: url(#glow-green);
      animation: pulsate 2.5s ease-in-out infinite alternate;
    }

    /* Core text animations */
    .text-title {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-weight: 900;
      font-size: 52px;
      fill: #ffffff;
      letter-spacing: 12px;
      filter: url(#text-glow);
    }
    .text-subtitle {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-weight: 600;
      font-size: 16px;
      fill: #00f2fe;
      letter-spacing: 10px;
      opacity: 0.9;
      animation: blink 2.5s infinite alternate;
    }

    @keyframes drawLine {
      0% {
        stroke-dashoffset: 1000;
      }
      100% {
        stroke-dashoffset: 0;
      }
    }
    @keyframes pulsate {
      0% { r: 3.5px; opacity: 0.5; }
      100% { r: 7px; opacity: 1; }
    }
    @keyframes blink {
      0% { opacity: 0.3; }
      100% { opacity: 1; }
    }
  </style>

  <!-- Filters & Gradients -->
  <defs>
    <!-- Glow filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="text-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Line Gradient -->
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b51e0" />
      <stop offset="50%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#39ff14" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect class="bg" width="1000" height="250" rx="10" />

  <!-- Grid lines for tech feel -->
  <g>
    <line x1="50" y1="0" x2="50" y2="250" class="grid-line" />
    <line x1="150" y1="0" x2="150" y2="250" class="grid-line" />
    <line x1="250" y1="0" x2="250" y2="250" class="grid-line" />
    <line x1="350" y1="0" x2="350" y2="250" class="grid-line" />
    <line x1="450" y1="0" x2="450" y2="250" class="grid-line" />
    <line x1="550" y1="0" x2="550" y2="250" class="grid-line" />
    <line x1="650" y1="0" x2="650" y2="250" class="grid-line" />
    <line x1="750" y1="0" x2="750" y2="250" class="grid-line" />
    <line x1="850" y1="0" x2="850" y2="250" class="grid-line" />
    <line x1="950" y1="0" x2="950" y2="250" class="grid-line" />

    <line x1="0" y1="50" x2="1000" y2="50" class="grid-line" />
    <line x1="0" y1="100" x2="1000" y2="100" class="grid-line" />
    <line x1="0" y1="150" x2="1000" y2="150" class="grid-line" />
    <line x1="0" y1="200" x2="1000" y2="200" class="grid-line" />
  </g>

  <!-- Neural Network Connections (Left Side) -->
  <g>
    <line x1="100" y1="80" x2="180" y2="50" class="glow-line" style="animation-delay: 0s; animation-duration: 8s;" />
    <line x1="100" y1="80" x2="150" y2="150" class="glow-line" style="animation-delay: 1.5s; animation-duration: 6s;" />
    <line x1="180" y1="50" x2="250" y2="100" class="glow-line" style="animation-delay: 3s; animation-duration: 9s;" />
    <line x1="150" y1="150" x2="250" y2="100" class="glow-line" style="animation-delay: 0.5s; animation-duration: 10s;" />
    <line x1="150" y1="150" x2="220" y2="200" class="glow-line" style="animation-delay: 2s; animation-duration: 7s;" />
    <line x1="250" y1="100" x2="320" y2="60" class="glow-line" style="animation-delay: 4.5s; animation-duration: 6s;" />
    <line x1="220" y1="200" x2="300" y2="160" class="glow-line" style="animation-delay: 3.5s; animation-duration: 9s;" />
    <line x1="320" y1="60" x2="300" y2="160" class="glow-line" style="animation-delay: 5s; animation-duration: 11s;" />
  </g>

  <!-- Neural Network Connections (Right Side) -->
  <g>
    <line x1="900" y1="80" x2="820" y2="50" class="glow-line" style="animation-delay: 0.5s; animation-duration: 8s;" />
    <line x1="900" y1="80" x2="850" y2="150" class="glow-line" style="animation-delay: 2s; animation-duration: 6s;" />
    <line x1="820" y1="50" x2="750" y2="100" class="glow-line" style="animation-delay: 3.5s; animation-duration: 9s;" />
    <line x1="850" y1="150" x2="750" y2="100" class="glow-line" style="animation-delay: 1s; animation-duration: 10s;" />
    <line x1="850" y1="150" x2="780" y2="200" class="glow-line" style="animation-delay: 2.5s; animation-duration: 7s;" />
    <line x1="750" y1="100" x2="680" y2="60" class="glow-line" style="animation-delay: 5s; animation-duration: 6s;" />
    <line x1="780" y1="200" x2="700" y2="160" class="glow-line" style="animation-delay: 4s; animation-duration: 9s;" />
    <line x1="680" y1="60" x2="700" y2="160" class="glow-line" style="animation-delay: 5.5s; animation-duration: 11s;" />
  </g>

  <!-- Nodes (Left Side) -->
  <circle cx="100" cy="80" r="5" class="node" style="animation-delay: 0s;" />
  <circle cx="180" cy="50" r="5" class="node-purple" style="animation-delay: 0.5s;" />
  <circle cx="150" cy="150" r="5" class="node-green" style="animation-delay: 1s;" />
  <circle cx="250" cy="100" r="6" class="node" style="animation-delay: 1.5s;" />
  <circle cx="220" cy="200" r="5" class="node-purple" style="animation-delay: 0.2s;" />
  <circle cx="320" cy="60" r="5" class="node-green" style="animation-delay: 0.8s;" />
  <circle cx="300" cy="160" r="6" class="node" style="animation-delay: 1.2s;" />

  <!-- Nodes (Right Side) -->
  <circle cx="900" cy="80" r="5" class="node" style="animation-delay: 0.1s;" />
  <circle cx="820" cy="50" r="5" class="node-purple" style="animation-delay: 0.6s;" />
  <circle cx="850" cy="150" r="5" class="node-green" style="animation-delay: 1.1s;" />
  <circle cx="750" cy="100" r="6" class="node" style="animation-delay: 1.6s;" />
  <circle cx="780" cy="200" r="5" class="node-purple" style="animation-delay: 0.3s;" />
  <circle cx="680" cy="60" r="5" class="node-green" style="animation-delay: 0.9s;" />
  <circle cx="700" cy="160" r="6" class="node" style="animation-delay: 1.3s;" />

  <!-- Central Text (Branding) -->
  <g text-anchor="middle">
    <!-- Main Title -->
    <text x="500" y="125" class="text-title">TRUNG VI</text>
    <!-- Subtitle -->
    <text x="500" y="165" class="text-subtitle">AI &amp; DEEP LEARNING ENGINEER</text>
  </g>
</svg>
