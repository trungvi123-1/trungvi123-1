<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="100%">
  <style>
    .bg { fill: #070913; }

    /* Dino runs across, jumps over text, lands, exits */
    @keyframes dino-run {
      0%    { transform: translate(-100px, 0); }
      35%   { transform: translate(180px, 0); }
      45%   { transform: translate(280px, -55px); }
      55%   { transform: translate(380px, -60px); }
      65%   { transform: translate(500px, -35px); }
      75%   { transform: translate(600px, 0); }
      100%  { transform: translate(900px, 0); }
    }

    /* Text bounce when dino lands */
    @keyframes text-shake {
      0%, 70%, 100% { transform: translateY(0); }
      72%  { transform: translateY(-4px); }
      74%  { transform: translateY(2px); }
      76%  { transform: translateY(-1px); }
      78%  { transform: translateY(0); }
    }

    /* Text glow pulse when dino is overhead */
    @keyframes text-glow-pulse {
      0%, 40%, 65%, 100% { filter: drop-shadow(0 0 2px rgba(0, 240, 255, 0.4)); }
      45%, 60% { filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.95)) drop-shadow(0 0 15px rgba(255, 0, 127, 0.6)); }
    }

    /* Laser scanner animation */
    @keyframes laser-sweep {
      0%, 100% { transform: translateY(20px); opacity: 0.3; }
      50%      { transform: translateY(200px); opacity: 0.9; }
    }

    @keyframes blink {
      0%, 49%  { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @keyframes ground-scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-12px); }
    }

    /* Pulse animation for HUD widgets */
    @keyframes hud-pulse {
      0%, 100% { opacity: 0.4; }
      50%      { opacity: 0.8; }
    }

    @keyframes green-pulse {
      0%, 100% { fill: #00f0ff; opacity: 0.4; }
      50%      { fill: #39ff14; opacity: 1; filter: drop-shadow(0 0 3px #39ff14); }
    }

    .dino { animation: dino-run 6s linear infinite; }
    .text-group { animation: text-shake 6s linear infinite; }
    .text-glow { animation: text-glow-pulse 6s linear infinite; }
    .cursor { animation: blink 1s step-end infinite; }
    .ground-scroll { animation: ground-scroll 0.3s linear infinite; }
    .hud-element { animation: hud-pulse 3s ease-in-out infinite; }
    .hud-status-dot { animation: green-pulse 2s ease-in-out infinite; }
    .laser-line { animation: laser-sweep 4s ease-in-out infinite; }
  </style>

  <defs>
    <!-- Background Grid -->
    <pattern id="cyber-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f0ff" stroke-width="0.75" opacity="0.07"/>
      <circle cx="0" cy="0" r="1" fill="#ff007f" opacity="0.15"/>
    </pattern>

    <!-- Ground Pattern -->
    <pattern id="ground" width="12" height="3" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="6" height="1" fill="#00f0ff" opacity="0.12"/>
      <rect x="8" y="1" width="3" height="1" fill="#ff007f" opacity="0.08"/>
    </pattern>

    <!-- Glowing effect filters -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="6" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Linear Gradient for Laser Scanner -->
    <linearGradient id="laser-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0"/>
      <stop offset="15%" stop-color="#00f0ff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#00f0ff" stop-opacity="1"/>
      <stop offset="85%" stop-color="#00f0ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Linear Gradient for Text Logo Fill -->
    <linearGradient id="text-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#ff007f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect class="bg" width="800" height="220" rx="8"/>
  <rect width="800" height="220" fill="url(#cyber-grid)" rx="8"/>

  <!-- Cybernetic Corner Brackets (HUD) -->
  <g stroke="#00f0ff" stroke-width="1.5" fill="none" opacity="0.4">
    <!-- Top-Left -->
    <path d="M 25 45 V 25 H 45"/>
    <line x1="25" y1="25" x2="30" y2="30" stroke-width="1"/>
    <!-- Top-Right -->
    <path d="M 775 45 V 25 H 755"/>
    <line x1="775" y1="25" x2="770" y2="30" stroke-width="1"/>
    <!-- Bottom-Left -->
    <path d="M 25 175 V 195 H 45"/>
    <line x1="25" y1="195" x2="30" y2="190" stroke-width="1"/>
    <!-- Bottom-Right -->
    <path d="M 775 175 V 195 H 755"/>
    <line x1="775" y1="195" x2="770" y2="190" stroke-width="1"/>
  </g>

  <!-- HUD Widgets / Metadata -->
  <g font-family="monospace" font-size="8" letter-spacing="1.5" fill="#00f0ff" class="hud-element">
    <!-- Top Left Status -->
    <g transform="translate(35, 38)">
      <circle cx="0" cy="-3" r="2.5" class="hud-status-dot" fill="#00f0ff"/>
      <text x="8" y="0">SYS: ACTIVE</text>
    </g>
    <!-- Top Right Stats -->
    <g transform="translate(670, 38)" text-anchor="start">
      <text x="0" y="0">LOC: 10.76°N</text>
    </g>
    <!-- Bottom Left Stats -->
    <g transform="translate(35, 187)">
      <text x="0" y="0">ENG: GEMINI_3.5</text>
    </g>
    <!-- Bottom Right Stats -->
    <g transform="translate(685, 187)">
      <text x="0" y="0">MODE: RUN_</text>
    </g>
  </g>

  <!-- Ground Line (Glowing neon) -->
  <line x1="25" y1="202" x2="775" y2="202" stroke="#00f0ff" stroke-width="1" opacity="0.3"/>
  <line x1="25" y1="202" x2="775" y2="202" stroke="#00f0ff" stroke-width="3" opacity="0.1" filter="url(#neon-glow)"/>
  <rect x="25" y="203" width="750" height="10" fill="url(#ground)" class="ground-scroll"/>

  <!-- Laser Scanner Line -->
  <line x1="25" y1="0" x2="775" y2="0" stroke="url(#laser-gradient)" stroke-width="2" class="laser-line"/>
  <line x1="25" y1="0" x2="775" y2="0" stroke="url(#laser-gradient)" stroke-width="6" opacity="0.4" class="laser-line" filter="url(#neon-glow)"/>

  <!-- ====== NEON HOLOGRAPHIC CACTI ====== -->
  <g fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.15">
    <!-- Left cactus -->
    <path d="M 100 202 V 174 M 97 180 H 100 M 97 180 V 188 M 103 184 H 100 M 103 184 V 194"/>
    <circle cx="100" cy="174" r="1" fill="#00f0ff"/>
    <!-- Right cactus -->
    <path d="M 650 202 V 170 M 647 176 H 650 M 647 176 V 184 M 653 180 H 650 M 653 180 V 190"/>
    <circle cx="650" cy="170" r="1" fill="#00f0ff"/>
  </g>

  <!-- ====== PIXEL CYBER-DINOSAUR (large - 2x scale) ====== -->
  <g class="dino">
    <!-- Neon Hover Shadow on ground -->
    <ellipse cx="0" cy="202" rx="25" ry="2.5" fill="#00f0ff" opacity="0.18" filter="url(#neon-glow)"/>

    <!-- Body (Neon Cyan) -->
    <g fill="#00f0ff">
      <rect x="-40" y="152" width="8" height="8"/>
      <rect x="-32" y="144" width="14" height="16"/>
      <rect x="-18" y="138" width="12" height="6"/>
      <rect x="-6" y="134" width="8" height="4"/>

      <!-- Head -->
      <rect x="2" y="128" width="14" height="10"/>
      <rect x="16" y="128" width="6" height="4"/>

      <!-- Neck / torso bottom -->
      <rect x="-36" y="160" width="20" height="8"/>
      <rect x="-30" y="168" width="16" height="8"/>

      <!-- Tail -->
      <rect x="-48" y="156" width="8" height="4"/>
      <rect x="-56" y="160" width="8" height="4"/>
      <rect x="-62" y="164" width="6" height="4"/>
      <rect x="-64" y="168" width="4" height="4"/>

      <!-- Back leg -->
      <rect x="-34" y="176" width="8" height="12"/>
      <rect x="-34" y="188" width="6" height="4"/>
      <rect x="-38" y="192" width="6" height="4"/>

      <!-- Arm -->
      <rect x="0" y="148" width="4" height="8"/>
      <rect x="4" y="154" width="4" height="4"/>
    </g>

    <!-- Front leg (Slightly dimmed for depth) -->
    <g fill="#00f0ff" opacity="0.6">
      <rect x="-14" y="176" width="8" height="12"/>
      <rect x="-14" y="188" width="6" height="4"/>
      <rect x="-10" y="192" width="8" height="4"/>
    </g>

    <!-- Belly Core (Glow overlay) -->
    <rect x="-30" y="160" width="10" height="8" fill="#ffffff" opacity="0.5"/>

    <!-- Back Spikes (Neon Pink) -->
    <g fill="#ff007f">
      <rect x="-28" y="134" width="6" height="4"/>
      <rect x="-36" y="138" width="6" height="4"/>
      <rect x="-42" y="144" width="4" height="4"/>
    </g>

    <!-- Laser Eye (Neon Red) -->
    <rect x="8" y="132" width="4" height="4" fill="#ff0033" filter="url(#neon-glow)"/>
    
    <!-- Mouth seam -->
    <rect x="4" y="138" width="14" height="2" fill="#070913"/>
  </g>

  <!-- ====== GEOMETRIC LOGO "trungvi" ====== -->
  <g class="text-group" transform="translate(0, 0)">
    <!-- Glow Layers behind the text -->
    <g fill="url(#text-gradient)" class="text-glow" filter="url(#neon-glow)" opacity="0.8">
      <!-- t (Translate: 239, 75) -->
      <g transform="translate(239, 75)">
        <path d="M 12 10 h 8 v 38 c 0 4 2 6 6 6 h 6 v 6 h -8 c -10 0 -12 -4 -12 -12 Z"/>
        <path d="M 4 20 h 24 v 6 H 4 Z"/>
      </g>
      <!-- r (Translate: 284, 75) -->
      <g transform="translate(284, 75)">
        <path d="M 4 20 h 20 L 28 24 v 4 H 12 v 32 h -8 Z"/>
      </g>
      <!-- u (Translate: 329, 75) -->
      <g transform="translate(329, 75)">
        <path d="M 4 20 h 8 v 28 h 16 v -28 h 8 v 32 L 28 60 H 12 L 4 52 Z"/>
      </g>
      <!-- n (Translate: 386, 75) -->
      <g transform="translate(386, 75)">
        <path d="M 4 28 L 12 20 h 16 L 36 28 v 32 h -8 v -28 H 12 v 28 h -8 Z"/>
      </g>
      <!-- g (Translate: 443, 75) -->
      <g transform="translate(443, 75)" fill-rule="evenodd">
        <path d="M 4 24 L 8 20 h 20 L 32 24 v 28 c 0 4 -2 6 -6 6 H 10 v -8 h 14 v -8 H 4 Z M 12 28 h 12 v 8 H 12 Z"/>
      </g>
      <!-- v (Translate: 492, 75) -->
      <g transform="translate(492, 75)">
        <path d="M 4 20 h 8 l 8 24 l 8 -24 h 8 L 22 60 h -4 Z"/>
      </g>
      <!-- i (Translate: 537, 75) -->
      <g transform="translate(537, 75)">
        <path d="M 12 28 h 8 v 32 h -8 Z M 12 20 L 16 16 L 20 20 L 16 24 Z"/>
      </g>
    </g>

    <!-- Foreground Sharp Layers -->
    <g fill="url(#text-gradient)">
      <!-- t (Translate: 239, 75) -->
      <g transform="translate(239, 75)">
        <path d="M 12 10 h 8 v 38 c 0 4 2 6 6 6 h 6 v 6 h -8 c -10 0 -12 -4 -12 -12 Z"/>
        <path d="M 4 20 h 24 v 6 H 4 Z"/>
      </g>
      <!-- r (Translate: 284, 75) -->
      <g transform="translate(284, 75)">
        <path d="M 4 20 h 20 L 28 24 v 4 H 12 v 32 h -8 Z"/>
      </g>
      <!-- u (Translate: 329, 75) -->
      <g transform="translate(329, 75)">
        <path d="M 4 20 h 8 v 28 h 16 v -28 h 8 v 32 L 28 60 H 12 L 4 52 Z"/>
      </g>
      <!-- n (Translate: 386, 75) -->
      <g transform="translate(386, 75)">
        <path d="M 4 28 L 12 20 h 16 L 36 28 v 32 h -8 v -28 H 12 v 28 h -8 Z"/>
      </g>
      <!-- g (Translate: 443, 75) -->
      <g transform="translate(443, 75)" fill-rule="evenodd">
        <path d="M 4 24 L 8 20 h 20 L 32 24 v 28 c 0 4 -2 6 -6 6 H 10 v -8 h 14 v -8 H 4 Z M 12 28 h 12 v 8 H 12 Z"/>
      </g>
      <!-- v (Translate: 492, 75) -->
      <g transform="translate(492, 75)">
        <path d="M 4 20 h 8 l 8 24 l 8 -24 h 8 L 22 60 h -4 Z"/>
      </g>
      <!-- i (Translate: 537, 75) -->
      <g transform="translate(537, 75)">
        <path d="M 12 28 h 8 v 32 h -8 Z M 12 20 L 16 16 L 20 20 L 16 24 Z"/>
      </g>
    </g>

    <!-- Horizontal Stencil Slice (laser cut detail) -->
    <rect x="230" y="106" width="335" height="2.5" fill="#070913"/>

    <!-- Subtitle (AI ENGINEER) -->
    <text x="400" y="160" font-family="'Courier New', 'Consolas', monospace" font-weight="bold"
          font-size="11" letter-spacing="7" fill="#00f0ff" opacity="0.8">// AI ENGINEER //</text>

    <!-- Terminal typing cursor beside subtitle -->
    <rect x="526" y="150" width="6" height="11" fill="#ff007f" class="cursor"/>
  </g>
</svg>
