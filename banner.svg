<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="100%">
  <style>
    .bg { fill: #0D1117; }

    @keyframes drawLine {
      0%   { stroke-dashoffset: 800; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 1; }
    }
    @keyframes float-up {
      0%   { transform: translateY(0); opacity: 0.8; }
      100% { transform: translateY(-50px); opacity: 0; }
    }
    @keyframes blink {
      0%, 49%  { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes scan {
      0%   { transform: translateY(0); }
      100% { transform: translateY(220px); }
    }
    @keyframes pixelPop {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50%       { transform: scale(1.8); opacity: 0.9; }
    }
    @keyframes titleGlow {
      0%, 100% { opacity: 0.7; }
      50%       { opacity: 1; }
    }

    .path-anim {
      stroke: #D97706;
      stroke-width: 2;
      fill: none;
      stroke-dasharray: 800;
      stroke-dashoffset: 800;
      animation: drawLine 8s linear infinite;
    }
    .path-anim-b {
      stroke: #F59E0B;
      stroke-width: 2;
      fill: none;
      stroke-dasharray: 800;
      stroke-dashoffset: 800;
      animation: drawLine 8s linear 3s infinite;
    }
    .node-a { animation: pulse 2s ease-in-out infinite; }
    .node-b { animation: pulse 2s ease-in-out 0.5s infinite; }
    .node-c { animation: pulse 2s ease-in-out 1s infinite; }
    .node-d { animation: pulse 2s ease-in-out 1.5s infinite; }
    .particle { animation: float-up 3s linear infinite; }
    .scanline { animation: scan 4s linear infinite; }
    .cursor { animation: blink 1s step-end infinite; }
    .pixel-pop { animation: pixelPop 2.5s ease-in-out infinite; }
  </style>

  <defs>
    <!-- Scanline pattern -->
    <pattern id="scan" width="800" height="4" patternUnits="userSpaceOnUse">
      <rect width="800" height="2" fill="rgba(0,0,0,0.12)"/>
    </pattern>

    <!-- Dot grid -->
    <pattern id="dotgrid" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="0.5" fill="#D97706" opacity="0.06"/>
    </pattern>

    <!-- Orange glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong glow for title -->
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Animated gradient for title -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D97706">
        <animate attributeName="stop-color" values="#D97706;#F59E0B;#FBBF24;#F59E0B;#D97706" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#FBBF24">
        <animate attributeName="stop-color" values="#FBBF24;#D97706;#F59E0B;#D97706;#FBBF24" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#D97706">
        <animate attributeName="stop-color" values="#D97706;#FBBF24;#F59E0B;#FBBF24;#D97706" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect class="bg" width="800" height="220" rx="8"/>
  <rect width="800" height="220" fill="url(#dotgrid)" rx="8"/>

  <!-- Border -->
  <rect x="0" y="0" width="800" height="220" fill="none" stroke="#D97706" stroke-width="2" opacity="0.2" rx="8"/>
  <rect x="4" y="4" width="792" height="212" fill="none" stroke="#D97706" stroke-width="1" opacity="0.08" rx="6"/>

  <!-- Corner pixel accents -->
  <rect x="0" y="0" width="12" height="3" fill="#D97706" opacity="0.4"/>
  <rect x="0" y="0" width="3" height="12" fill="#D97706" opacity="0.4"/>
  <rect x="788" y="0" width="12" height="3" fill="#D97706" opacity="0.4"/>
  <rect x="797" y="0" width="3" height="12" fill="#D97706" opacity="0.4"/>
  <rect x="0" y="217" width="12" height="3" fill="#D97706" opacity="0.4"/>
  <rect x="0" y="208" width="3" height="12" fill="#D97706" opacity="0.4"/>
  <rect x="788" y="217" width="12" height="3" fill="#D97706" opacity="0.4"/>
  <rect x="797" y="208" width="3" height="12" fill="#D97706" opacity="0.4"/>

  <!-- ====== LEFT: Pixel neural network ====== -->
  <g transform="translate(35, 30)">
    <!-- Connection lines -->
    <line x1="0" y1="50" x2="35" y2="50" class="path-anim" style="animation-duration:6s"/>
    <line x1="35" y1="50" x2="35" y2="15" class="path-anim" style="animation-delay:0.8s;animation-duration:6s"/>
    <line x1="0" y1="50" x2="25" y2="50" class="path-anim-b" style="animation-duration:7s"/>
    <line x1="25" y1="50" x2="25" y2="95" class="path-anim-b" style="animation-delay:1s;animation-duration:7s"/>
    <line x1="35" y1="15" x2="85" y2="15" class="path-anim" style="animation-delay:1.5s;animation-duration:6s"/>
    <line x1="25" y1="95" x2="65" y2="95" class="path-anim-b" style="animation-delay:2s;animation-duration:7s"/>
    <line x1="65" y1="95" x2="65" y2="130" class="path-anim-b" style="animation-delay:2.8s;animation-duration:7s"/>
    <line x1="85" y1="15" x2="85" y2="65" class="path-anim" style="animation-delay:2.5s;animation-duration:6s"/>
    <line x1="85" y1="15" x2="125" y2="15" class="path-anim" style="animation-delay:3.2s;animation-duration:6s"/>

    <!-- Pixel nodes (squares, not circles) -->
    <rect x="-5" y="45" width="10" height="10" fill="#D97706" class="node-a" filter="url(#glow)"/>
    <rect x="30" y="10" width="10" height="10" fill="#F59E0B" class="node-b" filter="url(#glow)"/>
    <rect x="20" y="90" width="10" height="10" fill="#FBBF24" class="node-c" filter="url(#glow)"/>
    <rect x="80" y="10" width="10" height="10" fill="#D97706" class="node-d" filter="url(#glow)"/>
    <rect x="60" y="125" width="10" height="10" fill="#F59E0B" class="node-a" filter="url(#glow)"/>
    <rect x="80" y="60" width="10" height="10" fill="#FBBF24" class="node-b" filter="url(#glow)"/>
    <rect x="120" y="10" width="10" height="10" fill="#D97706" class="node-c" filter="url(#glow)"/>

    <!-- Floating pixel particles -->
    <rect x="12" y="30" width="4" height="4" fill="#F59E0B" class="particle" style="animation-delay:0s;animation-duration:3.5s"/>
    <rect x="50" y="60" width="3" height="3" fill="#FBBF24" class="particle" style="animation-delay:0.8s;animation-duration:4s"/>
    <rect x="95" y="40" width="4" height="4" fill="#D97706" class="particle" style="animation-delay:1.5s;animation-duration:3s"/>
    <rect x="42" y="108" width="3" height="3" fill="#F59E0B" class="particle" style="animation-delay:2s;animation-duration:4.5s"/>
  </g>

  <!-- ====== RIGHT: Pixel terminal / code window ====== -->
  <g transform="translate(685, 25)">
    <!-- Frame -->
    <rect x="0" y="0" width="80" height="100" fill="#161B22" stroke="#D97706" stroke-width="2" opacity="0.8" rx="4"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="80" height="16" fill="#21262D" rx="4"/>
    <rect x="0" y="8" width="80" height="8" fill="#21262D"/>
    <rect x="6" y="5" width="6" height="6" fill="#D97706" opacity="0.5"/>
    <rect x="16" y="5" width="6" height="6" fill="#D97706" opacity="0.3"/>
    <!-- Code lines with animated widths -->
    <rect x="8" y="22" width="30" height="4" fill="#F59E0B" opacity="0.7">
      <animate attributeName="width" values="30;55;30" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="8" y="32" width="45" height="4" fill="#D97706" opacity="0.6">
      <animate attributeName="width" values="45;20;45" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="8" y="42" width="20" height="4" fill="#FBBF24" opacity="0.5">
      <animate attributeName="width" values="20;40;20" dur="5s" repeatCount="indefinite"/>
    </rect>
    <rect x="8" y="52" width="50" height="4" fill="#D97706" opacity="0.7">
      <animate attributeName="width" values="50;30;50" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="8" y="62" width="35" height="4" fill="#F59E0B" opacity="0.6">
      <animate attributeName="width" values="35;55;35" dur="4.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="8" y="72" width="15" height="4" fill="#FBBF24" opacity="0.4">
      <animate attributeName="width" values="15;45;15" dur="3.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="8" y="82" width="40" height="4" fill="#D97706" opacity="0.5">
      <animate attributeName="width" values="40;25;40" dur="4.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Blinking cursor -->
    <rect x="18" y="84" width="8" height="3" fill="#F59E0B" class="cursor"/>
  </g>

  <!-- ====== CENTER: Main Title ====== -->
  <g text-anchor="middle">
    <!-- Glow shadow behind text -->
    <text x="400" y="108" font-family="'Courier New','Consolas',monospace" font-weight="bold"
          font-size="54" letter-spacing="10" fill="#D97706" opacity="0.12"
          filter="url(#glow-strong)">trungvi</text>

    <!-- Main pixel text -->
    <text x="400" y="108" font-family="'Courier New','Consolas',monospace" font-weight="bold"
          font-size="54" letter-spacing="10" fill="url(#titleGrad)"
          filter="url(#glow)">trungvi</text>

    <!-- Subtitle -->
    <text x="400" y="148" font-family="'Courier New','Consolas',monospace"
          font-size="13" letter-spacing="8" fill="#8B949E">AI  ENGINEER</text>

    <!-- Decorative pixel line under title -->
    <g opacity="0.5">
      <rect x="245" y="158" width="4" height="4" fill="#D97706" class="pixel-pop" style="animation-delay:0s"/>
      <rect x="261" y="158" width="4" height="4" fill="#F59E0B" class="pixel-pop" style="animation-delay:0.2s"/>
      <rect x="277" y="158" width="4" height="4" fill="#FBBF24" class="pixel-pop" style="animation-delay:0.4s"/>
      <rect x="293" y="158" width="4" height="4" fill="#F59E0B" class="pixel-pop" style="animation-delay:0.6s"/>

      <rect x="503" y="158" width="4" height="4" fill="#F59E0B" class="pixel-pop" style="animation-delay:0.8s"/>
      <rect x="519" y="158" width="4" height="4" fill="#FBBF24" class="pixel-pop" style="animation-delay:1s"/>
      <rect x="535" y="158" width="4" height="4" fill="#F59E0B" class="pixel-pop" style="animation-delay:1.2s"/>
      <rect x="551" y="158" width="4" height="4" fill="#D97706" class="pixel-pop" style="animation-delay:1.4s"/>
    </g>
  </g>

  <!-- ====== Bottom pixel bar ====== -->
  <g opacity="0.35">
    <rect x="80" y="193" width="4" height="4" fill="#D97706" class="pixel-pop" style="animation-delay:0s;animation-duration:3s"/>
    <rect x="92" y="193" width="4" height="4" fill="#F59E0B" class="pixel-pop" style="animation-delay:0.3s;animation-duration:3s"/>
    <rect x="104" y="193" width="4" height="4" fill="#FBBF24" class="pixel-pop" style="animation-delay:0.6s;animation-duration:3s"/>
    <rect x="116" y="193" width="4" height="4" fill="#F59E0B" class="pixel-pop" style="animation-delay:0.9s;animation-duration:3s"/>
    <rect x="128" y="193" width="4" height="4" fill="#D97706" class="pixel-pop" style="animation-delay:1.2s;animation-duration:3s"/>

    <rect x="660" y="193" width="4" height="4" fill="#D97706" class="pixel-pop" style="animation-delay:0.15s;animation-duration:3s"/>
    <rect x="672" y="193" width="4" height="4" fill="#F59E0B" class="pixel-pop" style="animation-delay:0.45s;animation-duration:3s"/>
    <rect x="684" y="193" width="4" height="4" fill="#FBBF24" class="pixel-pop" style="animation-delay:0.75s;animation-duration:3s"/>
    <rect x="696" y="193" width="4" height="4" fill="#F59E0B" class="pixel-pop" style="animation-delay:1.05s;animation-duration:3s"/>
    <rect x="708" y="193" width="4" height="4" fill="#D97706" class="pixel-pop" style="animation-delay:1.35s;animation-duration:3s"/>
  </g>

  <!-- Random floating pixel stars -->
  <rect x="160" y="35" width="2" height="2" fill="#F59E0B" class="particle" style="animation-delay:1s;animation-duration:4s"/>
  <rect x="620" y="45" width="2" height="2" fill="#FBBF24" class="particle" style="animation-delay:2s;animation-duration:3.5s"/>
  <rect x="200" y="170" width="2" height="2" fill="#D97706" class="particle" style="animation-delay:0.5s;animation-duration:5s"/>
  <rect x="580" y="165" width="2" height="2" fill="#F59E0B" class="particle" style="animation-delay:2.5s;animation-duration:3.8s"/>

  <!-- Scanline overlay -->
  <rect width="800" height="220" fill="url(#scan)" rx="8" class="scanline"/>

  <!-- Vignette -->
  <rect width="800" height="220" fill="none" stroke="#000" stroke-width="30" opacity="0.2" rx="8"/>
</svg>
