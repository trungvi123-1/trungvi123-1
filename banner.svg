<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <style>
    .bg { fill: #0D1117; }

    @keyframes blink {
      0%, 49%  { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .cursor { animation: blink 1.2s step-end infinite; }

    .title {
      font-family: 'Courier New', 'Consolas', monospace;
      font-weight: bold;
      font-size: 48px;
      letter-spacing: 8px;
    }

    .sub {
      font-family: 'Courier New', 'Consolas', monospace;
      font-size: 12px;
      letter-spacing: 6px;
    }
  </style>

  <defs>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="6"/>

  <!-- Single subtle line top -->
  <line x1="300" y1="60" x2="500" y2="60" stroke="#D97706" stroke-width="1" opacity="0.3"/>

  <!-- Main text -->
  <g text-anchor="middle">
    <text x="400" y="105" class="title" fill="#D97706" filter="url(#soft-glow)">trungvi</text>

    <text x="400" y="138" class="sub" fill="#6B7280">AI  ·  ENGINEER</text>

    <!-- Cursor -->
    <rect x="506" y="82" width="8" height="24" fill="#D97706" class="cursor"/>
  </g>

  <!-- Single subtle line bottom -->
  <line x1="340" y1="158" x2="460" y2="158" stroke="#D97706" stroke-width="1" opacity="0.15"/>
</svg>
