<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <!-- Styles and Fonts -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;display=swap');
    
    .terminal-bg { fill: #0d1117; stroke: #30363d; stroke-width: 1.5; }
    .bar-bg { fill: #161b22; }
    
    .text-base {
      font-family: 'Fira Code', monospace;
      font-size: 13.5px;
      fill: #c9d1d9;
    }
    
    .prompt { fill: #58a6ff; font-weight: bold; }
    .cmd { fill: #ff7b72; }
    .ascii { fill: #39ff14; font-weight: bold; font-size: 12px; }
    .success { fill: #39ff14; font-weight: bold; }
    .label { fill: #79c0ff; font-weight: bold; }
    .value { fill: #c9d1d9; }
    .comment { fill: #8b949e; font-style: italic; }

    /* Blinking cursor */
    .cursor {
      fill: #39ff14;
      animation: blink 0.8s step-end infinite;
    }
    
    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>

  <!-- Definitions for clipping animations -->
  <defs>
    <clipPath id="clip-cmd">
      <rect x="135" y="45" width="0" height="25">
        <animate attributeName="width" from="0" to="220" dur="1.8s" begin="0.5s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

  <!-- Terminal Window Container -->
  <rect class="terminal-bg" width="800" height="350" rx="8" />
  
  <!-- Title Bar -->
  <path class="bar-bg" d="M 8 0 L 792 0 A 8 8 0 0 1 800 8 L 800 30 L 0 30 L 0 8 A 8 8 0 0 1 8 0 Z" />
  
  <!-- Window Controls (Red, Yellow, Green circles) -->
  <circle cx="20" cy="15" r="6" fill="#ff5f56" />
  <circle cx="40" cy="15" r="6" fill="#ffbd2e" />
  <circle cx="60" cy="15" r="6" fill="#27c93f" />
  
  <!-- Window Title -->
  <text x="400" y="20" fill="#8b949e" font-size="12" text-anchor="middle" font-family="'Fira Code', monospace">trungvi@claude-code:~</text>

  <!-- Prompt & Command -->
  <g class="text-base">
    <text x="25" y="60"><tspan class="prompt">trungvi@claude-code:~$</tspan> <tspan class="cmd">claude-code init</tspan></text>
  </g>

  <!-- Command text typing simulation using clipPath -->
  <g class="text-base" clip-path="url(#clip-cmd)">
    <text x="25" y="60"><tspan class="prompt">trungvi@claude-code:~$</tspan> <tspan class="cmd">claude-code init</tspan></text>
  </g>

  <!-- Moving Cursor during typing -->
  <rect class="cursor" x="135" y="47" width="8" height="15">
    <animate attributeName="x" from="135" to="355" dur="1.8s" begin="0.5s" fill="freeze" />
  </rect>

  <!-- Terminal Output (Fades in after command finishes typing) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="2.3s" fill="freeze" />

    <!-- ASCII Art "TRUNG VI" -->
    <g class="ascii">
      <text x="25" y="100"> _____ ____  _   _ _   _  ____  __     _____ </text>
      <text x="25" y="115">|_   _|  _ \| | | | \ | |/ ___| \ \   / /_ _|</text>
      <text x="25" y="130">  | | | |_) | | | |  \| | |  _   \ \ / / | | </text>
      <text x="25" y="145">  | | |  _ &lt;| |_| | |\  | |_| |   \ V /  | | </text>
      <text x="25" y="160">  |_| |_| \_\\___/|_| \_|\____|    \_/  |___|</text>
    </g>

    <!-- CLI Status Logs -->
    <g class="text-base">
      <text x="25" y="195"><tspan class="success">✓</tspan> Deep Learning environment initialized (PyTorch, CUDA 12.1)</text>
      <text x="25" y="215"><tspan class="success">✓</tspan> Large Language Models &amp; AI Agents workspace active</text>
      <text x="25" y="235"><tspan class="success">✓</tspan> MLOps infrastructure connected successfully</text>
    </g>

    <!-- Divider -->
    <line x1="25" y1="255" x2="775" y2="255" stroke="#30363d" stroke-width="1" />

    <!-- User Profile Details -->
    <g class="text-base">
      <text x="25" y="280"><tspan class="label">Name:    </tspan><tspan class="value">Trung Vi</tspan></text>
      <text x="25" y="300"><tspan class="label">Role:    </tspan><tspan class="value">AI &amp; Deep Learning Engineer</tspan></text>
      <text x="25" y="320"><tspan class="label">Mission: </tspan><tspan class="value">Building intelligent, scalable, and autonomous systems.</tspan> <tspan class="comment">// open for collab</tspan></text>
    </g>
  </g>
</svg>
