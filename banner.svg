<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="100%">
  <style>
    .bg { fill: #0D1117; }

    @keyframes run {
      0%   { transform: translateX(-60px); }
      100% { transform: translateX(860px); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      30%       { transform: translateY(-25px); }
      60%       { transform: translateY(0); }
    }
    @keyframes blink {
      0%, 49%  { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes ground-scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-16px); }
    }

    .dino-run {
      animation: run 6s linear infinite;
    }
    .dino-bounce {
      animation: bounce 6s linear infinite, run 6s linear infinite;
    }
    .cursor { animation: blink 1s step-end infinite; }
    .ground { animation: ground-scroll 0.4s linear infinite; }
  </style>

  <defs>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ground pattern -->
    <pattern id="ground-pat" width="16" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="8" height="2" fill="#D97706" opacity="0.12"/>
      <rect x="12" y="0" width="4" height="2" fill="#D97706" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect class="bg" width="800" height="220" rx="6"/>

  <!-- Ground -->
  <line x1="0" y1="195" x2="800" y2="195" stroke="#D97706" stroke-width="1" opacity="0.15"/>
  <rect x="0" y="196" width="800" height="24" fill="url(#ground-pat)" class="ground"/>

  <!-- Ground pixel bumps -->
  <g fill="#D97706" opacity="0.15">
    <rect x="40" y="194" width="4" height="2"/>
    <rect x="120" y="194" width="6" height="2"/>
    <rect x="200" y="194" width="3" height="2"/>
    <rect x="310" y="194" width="5" height="2"/>
    <rect x="430" y="194" width="4" height="2"/>
    <rect x="560" y="194" width="6" height="2"/>
    <rect x="680" y="194" width="3" height="2"/>
    <rect x="750" y="194" width="5" height="2"/>
  </g>

  <!-- ====== PIXEL DINOSAUR (Chrome T-Rex style) ====== -->
  <g class="dino-bounce">
    <!-- Body - main block -->
    <rect x="140" y="145" width="6" height="4" fill="#D97706"/>
    <rect x="146" y="141" width="10" height="8" fill="#D97706"/>
    <rect x="156" y="137" width="8" height="4" fill="#D97706"/>
    <rect x="164" y="135" width="4" height="2" fill="#D97706"/>
    <!-- Head -->
    <rect x="168" y="131" width="8" height="6" fill="#D97706"/>
    <rect x="176" y="131" width="4" height="2" fill="#D97706"/>
    <!-- Eye -->
    <rect x="172" y="133" width="2" height="2" fill="#0D1117"/>
    <!-- Mouth line -->
    <rect x="170" y="137" width="8" height="1" fill="#0D1117"/>
    <!-- Neck / body bottom -->
    <rect x="148" y="149" width="14" height="4" fill="#D97706"/>
    <rect x="152" y="153" width="12" height="4" fill="#D97706"/>
    <!-- Belly highlight -->
    <rect x="152" y="149" width="6" height="4" fill="#F59E0B" opacity="0.5"/>
    <!-- Tail -->
    <rect x="134" y="147" width="6" height="2" fill="#D97706"/>
    <rect x="128" y="149" width="6" height="2" fill="#D97706"/>
    <rect x="124" y="151" width="4" height="2" fill="#D97706"/>
    <rect x="120" y="153" width="4" height="2" fill="#D97706"/>
    <rect x="118" y="155" width="2" height="2" fill="#D97706"/>
    <!-- Legs - back -->
    <rect x="148" y="157" width="4" height="6" fill="#D97706"/>
    <rect x="148" y="163" width="4" height="2" fill="#D97706"/>
    <rect x="144" y="165" width="4" height="2" fill="#D97706"/>
    <!-- Legs - front -->
    <rect x="160" y="157" width="4" height="6" fill="#F59E0B" opacity="0.8"/>
    <rect x="160" y="163" width="4" height="2" fill="#F59E0B" opacity="0.8"/>
    <rect x="164" y="165" width="4" height="2" fill="#F59E0B" opacity="0.8"/>
    <!-- Arm -->
    <rect x="166" y="143" width="2" height="4" fill="#D97706"/>
    <rect x="168" y="145" width="2" height="2" fill="#D97706"/>
    <!-- Spikes on back -->
    <rect x="150" y="137" width="4" height="2" fill="#FBBF24"/>
    <rect x="142" y="139" width="4" height="2" fill="#FBBF24"/>
    <rect x="138" y="143" width="2" height="2" fill="#FBBF24"/>
  </g>

  <!-- ====== PIXEL CACTUS (with simple style) ====== -->
  <g fill="#D97706" opacity="0.3">
    <!-- Cactus 1 -->
    <rect x="680" y="169" width="4" height="26"/>
    <rect x="678" y="173" width="2" height="6"/>
    <rect x="686" y="177" width="2" height="6"/>
    <!-- Cactus 2 (smaller) -->
    <rect x="720" y="175" width="4" height="20"/>
    <rect x="718" y="179" width="2" height="5"/>
  </g>

  <!-- ====== CENTER TEXT ====== -->
  <g text-anchor="middle">
    <text x="400" y="115" font-family="'Courier New','Consolas',monospace" font-weight="bold"
          font-size="50" letter-spacing="8" fill="#D97706" filter="url(#soft-glow)">trungvi</text>

    <text x="400" y="148" font-family="'Courier New','Consolas',monospace"
          font-size="12" letter-spacing="6" fill="#6B7280">AI  ·  ENGINEER</text>

    <!-- Blinking cursor -->
    <rect x="508" y="92" width="8" height="24" fill="#D97706" class="cursor"/>
  </g>

  <!-- Pixel stars -->
  <g fill="#D97706" opacity="0.25">
    <rect x="90" y="50" width="2" height="2">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="650" y="55" width="2" height="2">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="380" y="35" width="2" height="2">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="550" y="40" width="2" height="2">
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="1.8s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
